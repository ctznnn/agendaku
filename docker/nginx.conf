# ==============================================================================
# Enterprise-Grade Nginx Production Configuration for Laravel
# Optimized for Google Cloud Platform (GCP) & Alibaba Cloud Enterprise Scale
# ==============================================================================

# Note: This file is loaded inside the http {} block of the master nginx config.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Document Root (points to Laravel's public directory)
    root /var/www/html/public;
    index index.php;

    # Accept all requests (routing and domain mapping is handled by the Cloud Load Balancer / Gateway)
    server_name _;

    # ==========================================
    # Real IP Resolution (GCP / Alibaba Cloud / Cloudflare)
    # ==========================================
    # Ensures Laravel's request helper (e.g. Request::ip()) returns the true client IP 
    # instead of the load balancer's internal IP.
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Trust typical private and local proxies (commonly used by cloud load balancers and VPCs)
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    # Trust Cloudflare proxy ranges (optional, but essential if proxying directly through CF)
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;

    # ==========================================
    # Buffer & Timeout Optimizations
    # ==========================================
    # Prevents "400 Bad Request" and "502 Bad Gateway" when cookies or OAuth headers are large.
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_body_buffer_size 128k;

    # Max upload size (allows larger file/image uploads, adjust as needed)
    client_max_body_size 128M;

    # Optimizations for keeping connections warm and cleaning dead sockets
    keepalive_timeout 65;
    keepalive_requests 10000;
    send_timeout 10;
    client_body_timeout 10;
    reset_timedout_connection on;

    # ==========================================
    # Security Headers & Rules
    # ==========================================
    # Basic clickjacking and MIME-sniffing protection
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Disable showing server versions for security hardening
    server_tokens off;

    # ==========================================
    # Compression (Gzip)
    # ==========================================
    # Enables gzip compression for text, styles, scripts, and layouts.
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        image/svg+xml;

    # ==========================================
    # Locations & Routing
    # ==========================================

    # Health Check Endpoint
    # Used by GCP GCLB / Alibaba SLB health checkers to verify container status
    location = /health {
        access_log off;
        log_not_found off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Main Router
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Prevent direct PHP execution in public storage or upload folders
    location ~* ^/(storage|uploads)/.*\.php$ {
        deny all;
    }

    # Deny access to sensitive files (git, env, htaccess, etc.)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # Static Assets & Caching
    # ==========================================
    # Vite bundles use content hashing, making them safe to cache indefinitely (365 days).
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|woff|woff2|svg|eot|ttf)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # ==========================================
    # PHP-FPM FastCGI Handler
    # ==========================================
    location ~ \.php$ {
        # Pass to the local PHP-FPM socket or TCP port
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # FastCGI performance and buffer tuning
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;

        # Timeouts to handle long-running background web requests
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 180s;
        fastcgi_read_timeout 180s;
    }
}
